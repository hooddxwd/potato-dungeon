<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战斗日志 - 土豆地城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 18px;
        }

        .result-badge.victory {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .result-badge.defeat {
            background: linear-gradient(135deg, #cb2d3e 0%, #ef473a 100%);
        }

        .result-badge.flee {
            background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            color: #333;
        }

        .battle-log {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            line-height: 1.6;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-turn {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .log-action {
            margin-left: 20px;
        }

        .log-damage {
            color: #ef473a;
        }

        .log-heal {
            color: #38ef7d;
        }

        .log-crit {
            color: #ffd700;
            font-weight: 600;
        }

        .rewards {
            background: linear-gradient(135deg, rgba(17, 153, 142, 0.2) 0%, rgba(56, 239, 125, 0.2) 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .reward-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reward-item:last-child {
            border-bottom: none;
        }

        .reward-label {
            color: #aaa;
        }

        .reward-value {
            font-weight: 600;
            color: #38ef7d;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
        }

        .button-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚔️ 战斗日志</h1>
            <div class="result-badge" id="resultBadge">胜利</div>
        </div>

        <div class="stats-summary">
            <div class="stat-card">
                <div class="stat-value" id="turnsCount">5</div>
                <div class="stat-label">战斗回合</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="remainingHp">25</div>
                <div class="stat-label">剩余HP</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="remainingMp">15</div>
                <div class="stat-label">剩余MP</div>
            </div>
        </div>

        <div class="battle-log" id="battleLog">
            <!-- 战斗日志将在这里动态生成 -->
        </div>

        <div class="rewards" id="rewards" style="display: none;">
            <h3 style="margin-bottom: 15px;">🎁 战利品</h3>
            <div id="rewardsList"></div>
        </div>

        <div class="actions">
            <button class="button button-primary" onclick="continueExploring()">继续探索</button>
            <button class="button button-secondary" onclick="returnToMap()">返回地图</button>
        </div>
    </div>

    <script>
        let battleData = null;
        let characterId = null;
        let runId = null;

        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function parseBattleData() {
            const data = getUrlParameter('data');
            if (data) {
                battleData = JSON.parse(decodeURIComponent(data));
                characterId = getUrlParameter('characterId');
                runId = getUrlParameter('runId');
                displayBattleResult();
            }
        }

        function displayBattleResult() {
            if (!battleData) return;

            // 显示结果标签
            const resultBadge = document.getElementById('resultBadge');
            resultBadge.className = 'result-badge';

            if (battleData.result === 'victory') {
                resultBadge.textContent = '🎉 战斗胜利';
                resultBadge.classList.add('victory');
            } else if (battleData.result === 'flee') {
                resultBadge.textContent = '🏃 成功逃跑';
                resultBadge.classList.add('flee');
            } else {
                resultBadge.textContent = '💀 战斗失败';
                resultBadge.classList.add('defeat');
            }

            // 显示统计数据
            document.getElementById('turnsCount').textContent = battleData.turns || 0;
            document.getElementById('remainingHp').textContent = battleData.remainingHp || 0;
            document.getElementById('remainingMp').textContent = battleData.remainingMp || 0;

            // 显示战斗日志
            const logContainer = document.getElementById('battleLog');
            if (battleData.battleLog && battleData.battleLog.length > 0) {
                logContainer.innerHTML = battleData.battleLog.map(log => {
                    let className = 'log-entry';
                    let content = log;

                    if (log.includes('攻击') && (log.includes('造成') || log.includes('伤害'))) {
                        content = content.replace(/(\d+) 点伤害/g, '<span class="log-damage">$1 点伤害</span>');
                    }
                    if (log.includes('恢复')) {
                        content = content.replace(/(\d+) HP/g, '<span class="log-heal">$1 HP</span>');
                    }
                    if (log.includes('暴击')) {
                        content = content.replace(/(暴击)/g, '<span class="log-crit">$1</span>');
                    }
                    if (log.includes('第') && log.includes('回合')) {
                        className = 'log-entry log-turn';
                    } else if (log.includes('===')) {
                        className = 'log-entry log-turn';
                    }

                    return `<div class="${className}">${content}</div>`;
                }).join('');
            } else {
                logContainer.innerHTML = '<div class="log-entry">暂无战斗日志</div>';
            }

            // 显示奖励
            const rewardsContainer = document.getElementById('rewards');
            const rewardsList = document.getElementById('rewardsList');

            if (battleData.rewards) {
                rewardsContainer.style.display = 'block';
                const rewards = battleData.rewards;

                let rewardsHtml = '';
                if (rewards.exp) {
                    rewardsHtml += `<div class="reward-item">
                        <span class="reward-label">经验值</span>
                        <span class="reward-value">+${rewards.exp}</span>
                    </div>`;
                }
                if (rewards.gold) {
                    rewardsHtml += `<div class="reward-item">
                        <span class="reward-label">金币</span>
                        <span class="reward-value">+${rewards.gold}</span>
                    </div>`;
                }
                if (rewards.equipment) {
                    const equip = rewards.equipment;
                    const rarityEmoji = {
                        common: '⚪',
                        uncommon: '🟢',
                        rare: '🔵',
                        epic: '🟣',
                        legendary: '🟠'
                    };
                    rewardsHtml += `<div class="reward-item">
                        <span class="reward-label">装备</span>
                        <span class="reward-value">${rarityEmoji[equip.rarity] || ''} ${equip.name}</span>
                    </div>`;
                }

                rewardsList.innerHTML = rewardsHtml;
            } else {
                rewardsContainer.style.display = 'none';
            }
        }

        function continueExploring() {
            if (runId && characterId) {
                // 这里可以调用探索API继续探索
                window.location.href = `/dungeon.html?characterId=${characterId}&runId=${runId}`;
            }
        }

        function returnToMap() {
            if (characterId) {
                window.location.href = `/index.html?characterId=${characterId}`;
            }
        }

        // 页面加载时解析数据
        window.onload = parseBattleData;
    </script>
</body>
</html>
